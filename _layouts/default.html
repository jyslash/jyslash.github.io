<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Notch:wght@200..700&family=Stack+Sans+Text:wght@200..700&family=Inter:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <nav class="top-nav" id="top-nav">
    <div class="nav-inner">
      <h1 class="nav-brand"><a href="{{ '/' | relative_url }}" data-url="{{ '/' | relative_url }}"><span class="brand-full">{{ site.title }}</span><span class="brand-short">JY Lee</span></a></h1>
      <div class="nav-center">
        <h1 class="nav-tab-heading"><a href="{{ '/' | relative_url }}" class="nav-tab" data-url="{{ '/' | relative_url }}">Posts</a></h1>
        <h1 class="nav-tab-heading"><a href="{{ '/designs/' | relative_url }}" class="nav-tab" data-url="{{ '/designs/' | relative_url }}">Designs</a></h1>
        <h1 class="nav-tab-heading"><a href="{{ '/talks/' | relative_url }}" class="nav-tab" data-url="{{ '/talks/' | relative_url }}">Talks</a></h1>
      </div>
      <div class="nav-right">
        <h1 class="nav-tab-heading"><a href="{{ '/about/' | relative_url }}" class="nav-tab" data-url="{{ '/about/' | relative_url }}">About</a></h1>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <span class="material-symbols-outlined theme-toggle-icon">dark_mode</span>
      </button>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
    <div class="nav-mobile-menu" id="nav-mobile-menu">
      <a href="{{ '/' | relative_url }}" class="nav-tab nav-mobile-link" data-url="{{ '/' | relative_url }}">Posts</a>
      <a href="{{ '/designs/' | relative_url }}" class="nav-tab nav-mobile-link" data-url="{{ '/designs/' | relative_url }}">Designs</a>
      <a href="{{ '/talks/' | relative_url }}" class="nav-tab nav-mobile-link" data-url="{{ '/talks/' | relative_url }}">Talks</a>
      <a href="{{ '/about/' | relative_url }}" class="nav-tab nav-mobile-link" data-url="{{ '/about/' | relative_url }}">About</a>
    </div>
  </nav>

  <main class="content-area" id="content-area">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-location-blurb">
        JY is currently in<br>Mountain View, California
      </div>
      <div class="footer-clocks">
        <div class="footer-clock-unit">
          <span class="footer-clock-city">JY time</span>
          <svg class="clock-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5"/>
            <line id="clock-local-hour" x1="50" y1="50" x2="50" y2="27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line id="clock-local-min"  x1="50" y1="50" x2="50" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
            <line id="clock-local-sec"  x1="50" y1="55" x2="50" y2="11" stroke="#e8453c" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
            <circle cx="50" cy="50" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <div class="footer-clock-unit">
          <span class="footer-clock-city">Seoul, Korea</span>
          <svg class="clock-svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5"/>
            <line id="clock-seoul-hour" x1="50" y1="50" x2="50" y2="27" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line id="clock-seoul-min"  x1="50" y1="50" x2="50" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
            <line id="clock-seoul-sec"  x1="50" y1="55" x2="50" y2="11" stroke="#4a6cf7" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
            <circle cx="50" cy="50" r="2.5" fill="currentColor"/>
          </svg>
        </div>
      </div>
      <div class="footer-contact">
        <p class="footer-contact-heading">Let's stay in touch</p>
        <a href="https://instagram.com/" class="footer-contact-link" target="_blank" rel="noopener">Instagram</a>
        <a href="https://linkedin.com/in/" class="footer-contact-link" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/app.js' | relative_url }}"></script>
</body>
</html>
