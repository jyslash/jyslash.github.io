---
layout: default
---
<div class="posts-feed">
  {% for post in site.posts %}
  <article class="feed-post">
    <time class="feed-post-date" datetime="{{ post.date | date_to_xmlschema }}">
      {{ post.date | date: "%b %-d, %Y" }}
    </time>
    <div class="feed-post-content">
      <h2 class="feed-post-title">{{ post.title | default: "Untitled" }}</h2>
      <div class="feed-post-image">
        {% if post.cover %}
        <img data-src="{{ post.cover | relative_url }}" alt="{{ post.title }}" loading="lazy">
        {% endif %}
      </div>
      <div class="feed-post-body post-lang" data-lang="en">{{ post.content }}</div>
      {% if post.korean_content %}
      <div class="feed-post-body post-lang" data-lang="ko">{{ post.korean_content | markdownify }}</div>
      <div class="post-lang-toggle-wrap">
        <button class="lang-toggle">Show in Korean</button>
      </div>
      {% endif %}
    </div>
  </article>
  {% endfor %}
</div>
